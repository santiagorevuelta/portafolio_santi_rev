  <text x="494" y="152" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#818cf8">Proveedores</text>
  <!-- Proveedor 1 -->
  <rect x="484" y="160" width="90" height="32" rx="6" fill="#1e2b3b"/>
  <rect x="490" y="166" width="50" height="6" rx="3" fill="#38bdf8"/>
  <rect x="490" y="178" width="35" height="5" rx="2" fill="#475569"/>
