  <rect x="484" y="198" width="90" height="32" rx="6" fill="#1e2b3b"/>
  <rect x="490" y="204" width="55" height="6" rx="3" fill="#38bdf8"/>
  <rect x="490" y="216" width="40" height="5" rx="2" fill="#475569"/>
