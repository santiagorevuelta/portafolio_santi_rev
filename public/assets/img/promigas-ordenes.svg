  <text x="52" y="66" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#brandPO)">Órdenes de Campo</text>
  <text x="52" y="90" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">App móvil + Backoffice · Proveedores · Promigas</text>

  <!-- Tags -->
  <g font-family="Arial, sans-serif" font-size="11" font-weight="bold">
    <rect x="52" y="350" width="80" height="24" rx="12" fill="#818cf822" stroke="#818cf8"/>
