    <rect x="142" y="350" width="80" height="24" rx="12" fill="#38bdf822" stroke="#38bdf8"/>
    <text x="152" y="366" fill="#7dd3fc">App móvil</text>
    <rect x="232" y="350" width="100" height="24" rx="12" fill="#34d39922" stroke="#34d399"/>
