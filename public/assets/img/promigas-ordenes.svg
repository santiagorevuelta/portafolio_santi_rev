  <text x="138" y="158" font-family="Arial" font-size="8" fill="#34d399">✓</text>
  <!-- Orden 2 -->
  <rect x="64" y="182" width="94" height="40" rx="7" fill="#1e2b3b" stroke="#818cf888"/>
