  <rect x="360" y="180" width="25" height="5" rx="2" fill="#34d39999"/>
  <rect x="272" y="195" width="40" height="5" rx="2" fill="#818cf8"/>
  <rect x="320" y="195" width="30" height="5" rx="2" fill="#475569"/>
  <rect x="360" y="195" width="25" height="5" rx="2" fill="#fbbf2499"/>
  <rect x="272" y="210" width="40" height="5" rx="2" fill="#818cf8"/>
  <rect x="320" y="210" width="30" height="5" rx="2" fill="#475569"/>
