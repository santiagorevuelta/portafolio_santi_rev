<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#131b2e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4edea3"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="80" cy="340" r="180" fill="url(#glow1)"/>
  <circle cx="540" cy="60" r="160" fill="url(#glow2)"/>

  <!-- Burbuja de chat del bot -->
  <g>
    <rect x="60" y="120" width="230" height="64" rx="18" fill="#1e2b3b" stroke="#334155"/>
    <circle cx="92" cy="152" r="14" fill="url(#brand)"/>
    <text x="86" y="157" font-family="Arial, sans-serif" font-size="14" fill="#0b1326" font-weight="bold">AI</text>
    <rect x="116" y="138" width="140" height="8" rx="4" fill="#4edea3" opacity="0.85"/>
    <rect x="116" y="154" width="100" height="8" rx="4" fill="#475569"/>
  </g>

  <!-- Burbuja del usuario -->
  <g>
    <rect x="310" y="204" width="230" height="52" rx="18" fill="#065f46"/>
    <rect x="334" y="222" width="150" height="8" rx="4" fill="#a7f3d0"/>
    <rect x="334" y="236" width="90" height="8" rx="4" fill="#34d399"/>
  </g>

  <!-- Nota de voz -->
  <g>
    <rect x="60" y="276" width="200" height="44" rx="18" fill="#1e2b3b" stroke="#334155"/>
    <polygon points="84,288 84,308 100,298" fill="#4edea3"/>
    <rect x="110" y="294" width="6" height="8" rx="2" fill="#38bdf8"/>
    <rect x="120" y="290" width="6" height="16" rx="2" fill="#38bdf8"/>
    <rect x="130" y="286" width="6" height="24" rx="2" fill="#38bdf8"/>
    <rect x="140" y="290" width="6" height="16" rx="2" fill="#38bdf8"/>
    <rect x="150" y="294" width="6" height="8" rx="2" fill="#38bdf8"/>
    <rect x="160" y="291" width="6" height="14" rx="2" fill="#38bdf8"/>
    <rect x="170" y="295" width="6" height="6" rx="2" fill="#38bdf8"/>
  </g>

  <!-- Título -->
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="url(#brand)">WP AI Studio</text>
  <text x="60" y="94" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">SaaS de chatbots IA para WhatsApp</text>

  <!-- Tags -->
  <g font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <rect x="330" y="330" width="60" height="26" rx="13" fill="#10b98122" stroke="#10b981"/>
    <text x="345" y="347" fill="#4edea3">IA</text>
    <rect x="398" y="330" width="60" height="26" rx="13" fill="#3b82f622" stroke="#3b82f6"/>
    <text x="411" y="347" fill="#7dd3fc">n8n</text>
    <rect x="466" y="330" width="90" height="26" rx="13" fill="#8b5cf622" stroke="#8b5cf6"/>
    <text x="478" y="347" fill="#c4b5fd">OpenAI</text>
  </g>
</svg>
