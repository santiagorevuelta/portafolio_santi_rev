<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgPS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#132b1e"/>
    </linearGradient>
    <linearGradient id="brandPS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgPS)"/>

  <!-- Mapa de fondo -->
  <g opacity="0.5">
    <path d="M60 140 q 120 -30 200 10 t 220 -10" stroke="#334155" stroke-width="2" fill="none"/>
    <path d="M60 220 q 140 40 240 0 t 240 20" stroke="#334155" stroke-width="2" fill="none"/>
    <path d="M60 300 q 100 -20 220 10 t 260 -20" stroke="#334155" stroke-width="2" fill="none"/>
    <path d="M180 100 q 20 120 -10 240" stroke="#334155" stroke-width="2" fill="none"/>
    <path d="M400 100 q -10 130 20 240" stroke="#334155" stroke-width="2" fill="none"/>
  </g>

  <!-- Pines del mapa -->
  <g>
    <path d="M170 190 c 0 -18 26 -18 26 0 c 0 12 -13 22 -13 22 s -13 -10 -13 -22z" fill="#fbbf24"/>
    <circle cx="183" cy="189" r="5" fill="#0b1326"/>
    <path d="M320 150 c 0 -18 26 -18 26 0 c 0 12 -13 22 -13 22 s -13 -10 -13 -22z" fill="#34d399"/>
    <circle cx="333" cy="149" r="5" fill="#0b1326"/>
    <path d="M430 250 c 0 -18 26 -18 26 0 c 0 12 -13 22 -13 22 s -13 -10 -13 -22z" fill="#fbbf24"/>
    <circle cx="443" cy="249" r="5" fill="#0b1326"/>
  </g>

  <!-- Panel solar -->
  <g transform="translate(210 240)">
    <rect x="0" y="0" width="120" height="70" rx="6" fill="#0f2547" stroke="#60a5fa" stroke-width="2" transform="skewX(-8)"/>
    <g stroke="#60a5fa" stroke-width="1.5" transform="skewX(-8)">
      <line x1="40" y1="0" x2="40" y2="70"/>
      <line x1="80" y1="0" x2="80" y2="70"/>
      <line x1="0" y1="23" x2="120" y2="23"/>
      <line x1="0" y1="47" x2="120" y2="47"/>
    </g>
    <rect x="48" y="70" width="12" height="20" fill="#334155" transform="skewX(-8)"/>
  </g>

  <!-- Sol -->
  <g>
    <circle cx="480" cy="90" r="26" fill="#fbbf24"/>
    <g stroke="#fbbf24" stroke-width="4" stroke-linecap="round">
      <line x1="480" y1="48" x2="480" y2="36"/>
      <line x1="480" y1="132" x2="480" y2="144"/>
      <line x1="438" y1="90" x2="426" y2="90"/>
      <line x1="522" y1="90" x2="534" y2="90"/>
      <line x1="451" y1="61" x2="443" y2="53"/>
      <line x1="509" y1="119" x2="517" y2="127"/>
      <line x1="509" y1="61" x2="517" y2="53"/>
      <line x1="451" y1="119" x2="443" y2="127"/>
    </g>
  </g>

  <!-- Título -->
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#brandPS)">Monitoreo Solar</text>
  <text x="60" y="94" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">Consumo de paneles con mapa georreferenciado · Promigas</text>

  <g font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <rect x="60" y="330" width="90 " height="26" rx="13" fill="#34d39922" stroke="#34d399"/>
    <text x="74" y="347" fill="#6ee7b7">Leaflet</text>
    <rect x="160" y="330" width="90" height="26" rx="13" fill="#60a5fa22" stroke="#60a5fa"/>
    <text x="172" y="347" fill="#93c5fd">PostGIS</text>
  </g>
</svg>
