<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgT360" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="brandT360" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="panoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee22"/>
      <stop offset="100%" stop-color="#a78bfa22"/>
    </linearGradient>
    <radialGradient id="sphereGrad" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#22d3ee44"/>
      <stop offset="100%" stop-color="#a78bfa18"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgT360)"/>

  <!-- Esfera panorámica 360 -->
  <circle cx="220" cy="215" r="105" fill="url(#sphereGrad)" stroke="#22d3ee" stroke-width="2"/>
  <!-- Meridianos y paralelos -->
  <g stroke="#22d3ee" stroke-width="1.2" fill="none" opacity="0.55">
    <ellipse cx="220" cy="215" rx="105" ry="38"/>
    <ellipse cx="220" cy="215" rx="105" ry="75"/>
    <ellipse cx="220" cy="215" rx="38" ry="105"/>
    <ellipse cx="220" cy="215" rx="75" ry="105"/>
    <line x1="115" y1="215" x2="325" y2="215"/>
    <line x1="220" y1="110" x2="220" y2="320"/>
  </g>
  <!-- Flecha de rotación 360 -->
  <path d="M 105 260 A 125 55 0 0 0 335 260" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <polygon points="335,260 322,248 320,266" fill="#a78bfa"/>

  <!-- Hotspots sobre la esfera -->
  <g>
    <circle cx="180" cy="180" r="9" fill="#22d3ee33" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="180" cy="180" r="3.5" fill="#22d3ee"/>
    <circle cx="262" cy="200" r="9" fill="#a78bfa33" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="262" cy="200" r="3.5" fill="#a78bfa"/>
    <circle cx="215" cy="258" r="9" fill="#f472b633" stroke="#f472b6" stroke-width="1.5"/>
    <circle cx="215" cy="258" r="3.5" fill="#f472b6"/>
  </g>

  <!-- Panel de administración a la derecha -->
  <rect x="380" y="130" width="180" height="200" rx="10" fill="#0f1c30" stroke="#334155" stroke-width="1.5"/>
  <rect x="392" y="142" width="110" height="10" rx="5" fill="#334155"/>
  <!-- Miniaturas de escenas del tour -->
  <rect x="392" y="162" width="48" height="34" rx="5" fill="url(#panoGrad)" stroke="#22d3ee" stroke-width="1"/>
  <rect x="448" y="162" width="48" height="34" rx="5" fill="url(#panoGrad)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="504" y="162" width="44" height="34" rx="5" fill="url(#panoGrad)" stroke="#475569" stroke-width="1"/>
  <rect x="392" y="204" width="48" height="34" rx="5" fill="url(#panoGrad)" stroke="#475569" stroke-width="1"/>
  <rect x="448" y="204" width="48" height="34" rx="5" fill="url(#panoGrad)" stroke="#475569" stroke-width="1"/>
  <!-- Botón agregar escena -->
  <rect x="504" y="204" width="44" height="34" rx="5" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="520" y="227" font-family="Arial" font-size="16" fill="#64748b">+</text>
  <rect x="392" y="252" width="156" height="1" fill="#1e3a5f"/>
  <!-- Botón compartir -->
  <rect x="392" y="266" width="156" height="26" rx="13" fill="#22d3ee22" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="424" y="283" font-family="Arial, sans-serif" font-size="11" fill="#67e8f9">Compartir tour</text>
  <!-- Link -->
  <rect x="392" y="302" width="120" height="8" rx="4" fill="#47556966"/>
  <circle cx="530" cy="306" r="7" fill="#a78bfa33" stroke="#a78bfa" stroke-width="1.2"/>

  <!-- Título -->
  <text x="60" y="66" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="url(#brandT360)">Tour360</text>
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Recorridos virtuales 360° que venden por ti</text>

  <!-- Tags -->
  <g font-family="Arial, sans-serif" font-size="11" font-weight="bold">
    <rect x="60" y="350" width="90" height="24" rx="12" fill="#22d3ee22" stroke="#22d3ee"/>
    <text x="72" y="366" fill="#67e8f9">Fotos 360°</text>
    <rect x="160" y="350" width="110" height="24" rx="12" fill="#a78bfa22" stroke="#a78bfa"/>
    <text x="172" y="366" fill="#c4b5fd">Inmobiliarias</text>
    <rect x="280" y="350" width="76" height="24" rx="12" fill="#f472b622" stroke="#f472b6"/>
    <text x="294" y="366" fill="#f9a8d4">Tours</text>
  </g>
</svg>
