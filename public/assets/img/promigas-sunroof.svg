<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgSR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1326"/>
      <stop offset="100%" stop-color="#0f2318"/>
    </linearGradient>
    <linearGradient id="brandSR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="soldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef444444"/>
      <stop offset="100%" stop-color="#b91c1c44"/>
    </linearGradient>
    <linearGradient id="availGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d39933"/>
      <stop offset="100%" stop-color="#059c6033"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgSR)"/>

  <!-- Grid de fondo tipo mapa -->
  <g opacity="0.18" stroke="#60a5fa" stroke-width="1" fill="none">
    <line x1="0" y1="130" x2="600" y2="130"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="270" x2="600" y2="270"/>
    <line x1="0" y1="340" x2="600" y2="340"/>
    <line x1="100" y1="100" x2="100" y2="400"/>
    <line x1="220" y1="100" x2="220" y2="400"/>
    <line x1="340" y1="100" x2="340" y2="400"/>
    <line x1="460" y1="100" x2="460" y2="400"/>
  </g>

  <!-- Polígono disponible grande -->
  <polygon points="135,155 210,138 248,185 220,238 145,242 112,198"
    fill="url(#availGrad)" stroke="#34d399" stroke-width="2"/>
  <!-- Pin disponible -->
  <circle cx="180" cy="190" r="5" fill="#34d399"/>

  <!-- Polígono vendido -->
  <polygon points="255,148 330,135 368,178 345,225 272,230 240,190"
    fill="url(#soldGrad)" stroke="#ef4444" stroke-width="2"/>
  <!-- Ícono vendido -->
  <text x="296" y="188" font-family="Arial" font-size="16" fill="#ef4444">✕</text>

  <!-- Polígono disponible pequeño -->
  <polygon points="378,162 440,150 468,195 445,234 380,238 352,200"
    fill="url(#availGrad)" stroke="#34d399" stroke-width="2"/>
  <circle cx="410" cy="195" r="5" fill="#34d399"/>

  <!-- Polígono disponible abajo -->
  <polygon points="145,258 218,248 240,295 210,330 140,332 115,290"
    fill="url(#availGrad)" stroke="#34d399" stroke-width="1.5"/>

  <!-- Polígono vendido abajo -->
  <polygon points="260,245 335,240 355,285 328,318 258,322 235,282"
    fill="url(#soldGrad)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="282" y="286" font-family="Arial" font-size="14" fill="#ef4444">✕</text>

  <!-- Panel detalle a la derecha -->
  <rect x="470" y="145" width="110" height="180" rx="10" fill="#0f1c30" stroke="#334155" stroke-width="1.5"/>
  <rect x="480" y="155" width="90" height="10" rx="5" fill="#334155"/>
  <rect x="480" y="172" width="70" height="8" rx="4" fill="#34d39966"/>
  <rect x="480" y="188" width="90" height="1" fill="#1e3a5f"/>
  <rect x="480" y="198" width="60" height="7" rx="3" fill="#475569"/>
  <rect x="480" y="212" width="80" height="7" rx="3" fill="#475569"/>
  <rect x="480" y="226" width="50" height="7" rx="3" fill="#475569"/>
  <rect x="480" y="248" width="90" height="1" fill="#1e3a5f"/>
  <!-- Botón registrar venta -->
  <rect x="480" y="264" width="90" height="24" rx="12" fill="#ef444422" stroke="#ef4444" stroke-width="1.2"/>
  <text x="491" y="280" font-family="Arial, sans-serif" font-size="10" fill="#f87171">Marcar vendido</text>
  <!-- Leyenda -->
  <circle cx="484" cy="300" r="5" fill="#34d399"/>
  <text x="493" y="304" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Disponible</text>
  <circle cx="484" cy="316" r="5" fill="#ef4444"/>
  <text x="493" y="320" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Vendido</text>

  <!-- Sol arriba derecha -->
  <circle cx="502" cy="80" r="20" fill="#fbbf2499" stroke="#fbbf24" stroke-width="1.5"/>
  <g stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round">
    <line x1="502" y1="48" x2="502" y2="42"/>
    <line x1="502" y1="118" x2="502" y2="112"/>
    <line x1="470" y1="80" x2="464" y2="80"/>
    <line x1="534" y1="80" x2="540" y2="80"/>
    <line x1="479" y1="57" x2="474" y2="52"/>
    <line x1="525" y1="103" x2="530" y2="108"/>
    <line x1="525" y1="57" x2="530" y2="52"/>
    <line x1="479" y1="103" x2="474" y2="108"/>
  </g>

  <!-- Título -->
  <text x="60" y="66" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="url(#brandSR)">Sunroof</text>
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Gestión y comercialización de predios solares · Promigas</text>

  <!-- Tags -->
  <g font-family="Arial, sans-serif" font-size="11" font-weight="bold">
    <rect x="60" y="350" width="76" height="24" rx="12" fill="#34d39922" stroke="#34d399"/>
    <text x="72" y="366" fill="#6ee7b7">Leaflet</text>
    <rect x="146" y="350" width="76" height="24" rx="12" fill="#60a5fa22" stroke="#60a5fa"/>
    <text x="156" y="366" fill="#93c5fd">PostGIS</text>
    <rect x="232" y="350" width="76" height="24" rx="12" fill="#fbbf2422" stroke="#fbbf24"/>
    <text x="244" y="366" fill="#fde68a">Mapas</text>
  </g>
</svg>
