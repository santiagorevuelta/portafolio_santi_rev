      <stop offset="100%" stop-color="#1c2a4a"/>
    </linearGradient>
    <linearGradient id="brandPC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgPC)"/>

  <!-- Celular -->
  <g>
    <rect x="110" y="110" width="130" height="230" rx="18" fill="#1e2b3b" stroke="#60a5fa" stroke-width="2"/>
    <rect x="122" y="132" width="106" height="14" rx="6" fill="#334155"/>
    <rect x="122" y="158" width="106" height="10" rx="5" fill="#60a5fa" opacity="0.8"/>
    <rect x="122" y="176" width="80" height="10" rx="5" fill="#475569"/>
    <rect x="122" y="200" width="106" height="34" rx="8" fill="#0f2547" stroke="#3b82f6"/>
    <rect x="130" y="212" width="60" height="8" rx="4" fill="#93c5fd"/>
    <rect x="122" y="244" width="106" height="34" rx="8" fill="#0f2547" stroke="#3b82f6"/>
    <rect x="130" y="256" width="70" height="8" rx="4" fill="#93c5fd"/>
    <rect x="122" y="292" width="106" height="30" rx="15" fill="#34d399"/>
    <text x="145" y="312" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#052e22">Enviar ✓</text>
    <circle cx="175" cy="120" r="3" fill="#475569"/>
  </g>

  <!-- Flujo de sincronización -->
  <g stroke="url(#brandPC)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="2 10">
    <path d="M260 220 q 60 -40 120 -10"/>
  </g>

  <!-- Servidor/nube -->
  <g>
    <rect x="395" y="170" width="140" height="36" rx="8" fill="#1e2b3b" stroke="#34d399"/>
    <circle cx="412" cy="188" r="5" fill="#34d399"/>
    <rect x="426" y="184" width="80" height="8" rx="4" fill="#475569"/>
    <rect x="395" y="216" width="140" height="36" rx="8" fill="#1e2b3b" stroke="#34d399"/>
    <circle cx="412" cy="234" r="5" fill="#fbbf24"/>
    <rect x="426" y="230" width="80" height="8" rx="4" fill="#475569"/>
    <rect x="395" y="262" width="140" height="36" rx="8" fill="#1e2b3b" stroke="#34d399"/>
    <circle cx="412" cy="280" r="5" fill="#60a5fa"/>
    <rect x="426" y="276" width="80" height="8" rx="4" fill="#475569"/>
  </g>

  <!-- Título -->
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#brandPC)">Recolección en Campo</text>
  <text x="60" y="94" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">App móvil de captura de información · Promigas</text>

  <g font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <rect x="395" y="330" width="120" height="26" rx="13" fill="#60a5fa22" stroke="#60a5fa"/>
    <text x="408" y="347" fill="#93c5fd">App móvil</text>
